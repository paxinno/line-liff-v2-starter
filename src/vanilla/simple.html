<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模擬LP</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 40px; }
        .container { max-width: 600px; margin: auto; }
        h1 { color: #333; }
        p { color: #555; line-height: 1.6; }
        .line-button {
            display: inline-block;
            padding: 15px 30px;
            margin-top: 20px;
            background-color: #06C755;
            color: white;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>検証用ページ</h1>
        <p>このページは、LINEミニアプリの動作検証を目的とした模擬ランディングページです。</p>
        <p>以下のボタンをタップして、検証用のLINE公式アカウントを「友だち追加」してください。</p>
        <a href="#" id="add-friend-link" class="line-button">LINEで友だち追加</a>
        <p style="margin-top: 30px; font-size: 12px; color: #999;">
            ※あとでLINE公式アカウントIDが提供されたら、このボタンのリンク先を更新します。
        </p>
    </div>
</body>
</html>
